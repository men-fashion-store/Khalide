<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3E2723">
    
    <title>محلات الصيني - إدارة العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #3E2723; /* بني غامق */
            --primary-light: #5D4037; 
            --bg-main: #F5F5DC; /* كريمي */
            --bg-card: #ffffff; /* أبيض */
            --text-dark: #000000; 
            --text-gray: #4E342E; 
            --border: #D7CCC8; 
            --radius: 12px;
            --shadow: 0 4px 12px rgba(62, 39, 35, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        body { margin: 0; padding: 0; background: var(--bg-main); color: var(--text-dark); -webkit-tap-highlight-color: transparent; }
        
        /* --- الهيدر --- */
        .header { background: var(--primary); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 22px; color: #fff; margin: 0 auto; }
        .header-actions button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        
        /* --- شريط الإجمالي --- */
        .total-banner { background: #5D4037; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; }
        .total-banner span { font-size: 24px; font-weight: 900; color: #F5F5DC; }

        /* --- الحاوية --- */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 120px; }

        /* --- الكروت والبحث --- */
        .action-card { background: var(--bg-card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        .search-box input { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 15px; background: #FFFBF0; }
        
        .add-client-form input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 10px; background: #FFFBF0; }
        .btn-add-user { background: var(--primary); color: white; border: none; border-radius: 8px; width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;}

        /* --- قائمة العملاء --- */
        .client-item { background: var(--bg-card); border-radius: var(--radius); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); margin-bottom: 12px; border-right: 6px solid var(--primary); cursor: pointer;}
        .cli-info h3 { margin: 0; font-size: 19px; font-weight: 900; color: var(--primary); }
        .cli-balance { font-size: 22px; font-weight: 900; color: var(--text-dark); background: #EFEBE9; padding: 5px 15px; border-radius: 8px; }

        /* ================= شاشة التفاصيل (البريميوم) ================= */
        #client-details-view { display: none; background: var(--bg-main); min-height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 200; overflow-y: hidden; }
        
        .cd-header { background: var(--primary); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: #fff; position: relative; z-index: 201;}
        .cd-header-actions { display: flex; gap: 8px; }
        .cd-header-actions button { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; color: white;}
        .btn-home { background: none; border: none; font-size: 22px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }

        .cd-body { height: calc(100vh - 65px); overflow: hidden; display: flex; flex-direction: column; }
        
        /* قسم الإضافة الاحترافي */
        .add-section { background: var(--bg-card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin: 15px; border: 1px solid var(--border); flex-shrink: 0; }
        
        .input-group { position: relative; margin-bottom: 10px; display: flex; align-items: center; }
        .input-group span { position: absolute; right: 12px; font-size: 18px; color: var(--text-gray); }
        .input-group input { width: 100%; padding: 12px 40px 12px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: #FFFBF0; font-size: 14px; font-weight: 700; color: var(--text-dark); transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); background: #fff; }
        
        .row-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-inputs .input-group { margin-bottom: 0; flex: 1; }

        .btn-save-item { background: var(--primary); color: white; width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        
        .pay-section { display: flex; gap: 10px; margin-top: 15px; border-top: 2px dashed var(--border); padding-top: 15px;}
        .pay-section .input-group { margin-bottom: 0; flex: 1; }
        .btn-save-pay { background: #1B5E20; color: white; border: none; border-radius: 8px; width: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}

        /* منطقة السكرول */
        .tx-scroll-area { flex-grow: 1; overflow-y: auto; padding: 0 15px 120px 15px; }
        .tx-scroll-area::-webkit-scrollbar { width: 6px; }
        .tx-scroll-area::-webkit-scrollbar-thumb { background: #D7CCC8; border-radius: 10px; }
        
        .tx-item { background: var(--bg-card); border-radius: var(--radius); padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 5px solid #ccc; }
        .tx-item.is-debt { border-right-color: var(--primary); }
        .tx-item.is-pay { border-right-color: #1B5E20; }
        
        /* كبسولة الإجمالي */
        .floating-total-pill { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 25px; border-radius: 50px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 25px rgba(62, 39, 35, 0.4); border: 2px solid #D7CCC8; z-index: 205; white-space: nowrap; }
        .ft-label { font-size: 14px; font-weight: 800; color: #D7CCC8; }
        .ft-value { font-size: 24px; font-weight: 900; display: flex; align-items: center; gap: 5px; direction: ltr; }

        /* ================= مكونات بريميوم إضافية ================= */
        .toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; font-size: 14px; font-weight: bold; transform: translateX(-50%); opacity: 0; transition: 0.3s; }
        .toast.show { visibility: visible; opacity: 1; bottom: 90px; }
        .toast.success { background-color: #1B5E20; border: 2px solid #4CAF50; }
        .toast.error { background-color: #B71C1C; border: 2px solid #F44336; }

        /* نافذة تأكيد مخصصة (Custom Confirm Modal) */
        .confirm-modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:4000; backdrop-filter:blur(2px); }
        .confirm-box { background: #fff; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .confirm-box h3 { margin: 0 0 10px 0; color: var(--primary); }
        .confirm-box p { color: #555; margin-bottom: 20px; font-weight: 600; font-size: 15px;}
        .confirm-actions { display: flex; gap: 10px; justify-content: center; }
        .confirm-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-cancel-modal { background: #eee; color: #333; }
        .btn-confirm-modal { background: #B71C1C; color: white; }

        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 4000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================= شاشة العرض المسبق للفاتورة ================= */
        .preview-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; }
        .preview-toolbar { background: var(--primary); padding: 15px; display: flex; justify-content: center; gap: 15px; }
        .preview-toolbar button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-dl { background: #fff; color: var(--primary); }
        .btn-close { background: #B71C1C; color: white; }
        .preview-content { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center;}
        
        /* الفاتورة الداخلي */
        .pdf-page { padding: 40px; background: white; color: black; font-family: 'Cairo', sans-serif; direction: rtl; width: 800px; max-width: 800px; margin: 0 auto; border: 1px solid #ccc;}
        .pdf-header { text-align: center; border-bottom: 3px solid #3E2723; padding-bottom: 15px; margin-bottom: 20px; }
        .pdf-header h1 { margin: 0; font-size: 32px; color: #3E2723; font-weight: 900;}
        .pdf-header p { margin: 5px 0 0 0; font-size: 16px; color: #5D4037;}
        /* استخدام جدول لمعلومات الفاتورة عشان html2pdf ميبوظش الـ RTL */
        .pdf-meta-table { width: 100%; margin-bottom: 20px; border: none; background: #F5F5DC; padding: 10px; border-radius: 8px;}
        .pdf-meta-table td { border: none; padding: 10px; font-weight: bold; font-size: 16px;}
        
        .pdf-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; border: 2px solid #3E2723; }
        .pdf-table th { background: #3E2723; color: #fff; padding: 12px; font-size: 15px; border: 1px solid #3E2723;}
        .pdf-table td { padding: 10px; border: 1px solid #D7CCC8; font-size: 14px; font-weight: 700;}
        .pdf-table tr:nth-child(even) { background: #FAFAFA; }
        .pdf-total-box { border: 2px solid #3E2723; background: #F5F5DC; padding: 15px; font-size: 22px; font-weight: 900; color: #3E2723; display: inline-block; border-radius: 8px;}
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay"><div class="spinner"></div></div>
    <div id="toast" class="toast"></div>

    <div id="confirm-modal" class="confirm-modal-overlay">
        <div class="confirm-box">
            <h3 id="confirm-title">تأكيد الحذف</h3>
            <p id="confirm-msg">هل أنت متأكد من مسح هذه البيانات؟</p>
            <div class="confirm-actions">
                <button class="btn-cancel-modal" onclick="closeConfirmModal()">إلغاء</button>
                <button class="btn-confirm-modal" id="confirm-btn">نعم، امسح</button>
            </div>
        </div>
    </div>

    <div id="main-view">
        <div class="header">
            <div class="header-actions">
                <button onclick="exportToExcel()" title="تصدير إكسيل">📊</button>
            </div>
            <div class="header-title">خالد الصيني</div>
            <div style="width: 38px; font-size: 22px; text-align: left; line-height: 38px;">🏠</div>
        </div>

        <div class="total-banner">
            <div>إجمالي ديون السوق:</div>
            <div dir="ltr"><span id="global-total">0</span> ج.م</div>
        </div>

        <div class="container">
            <div class="action-card">
                <div class="search-box" style="margin-bottom: 15px;">
                    <input type="text" id="searchInput" placeholder="🔍 ابحث عن اسم العميل..." oninput="filterClients()">
                </div>
                
                <div class="add-client-form">
                    <input type="text" id="new-client-name" placeholder="👤 اسم العميل (مطلوب)">
                    <div style="display: flex; gap: 10px;">
                        <input type="tel" id="new-client-phone" placeholder="📞 رقم التليفون (اختياري)">
                        <button class="btn-add-user" onclick="addClient()">➕</button>
                    </div>
                </div>
            </div>

            <div class="client-list" id="client-list"></div>
        </div>
    </div>

    <div id="client-details-view">
        <div class="cd-header">
            <div class="cd-header-actions">
                <button onclick="previewInvoice()" title="الفاتورة">🖨️</button>
                <button onclick="sendWhatsApp()" title="واتساب">💬</button>
                <button onclick="confirmDeleteClient()" title="حذف العميل">🗑️</button>
            </div>
            <div style="font-size: 20px; font-weight: 900; color: #fff;" id="cd-name">العميل</div>
            <button class="btn-home" onclick="closeClientDetails()" title="الرئيسية">🏠</button>
        </div>

        <div class="cd-body">
            <div class="add-section">
                <div class="input-group">
                    <span>🏷️</span>
                    <input type="text" id="item-desc" placeholder="اسم الصنف (شاشة، جراب، صيانة...)">
                </div>
                
                <div class="row-inputs">
                    <div class="input-group">
                        <span>📦</span>
                        <input type="number" id="item-qty" placeholder="الكمية" value="1">
                    </div>
                    <div class="input-group">
                        <span>💰</span>
                        <input type="number" id="item-price" placeholder="سعر القطعة">
                    </div>
                </div>
                
                <div class="input-group">
                    <span>📅</span>
                    <input type="date" id="item-date" title="تاريخ العملية">
                </div>

                <button class="btn-save-item" onclick="saveItem()">💾 تسجيــل المديونيــة</button>

                <div class="pay-section">
                    <div class="input-group">
                        <span>💵</span>
                        <input type="number" id="pay-amount" placeholder="مبلغ سداد نقدية">
                    </div>
                    <button class="btn-save-pay" onclick="savePayment()">✔</button>
                </div>
            </div>

            <div class="tx-scroll-area" id="cd-tx-list"></div>
        </div>

        <div class="floating-total-pill">
            <span class="ft-label">المطلوب سداده:</span>
            <span class="ft-value"><span id="cd-total-due">0</span> <span class="ft-currency">ج.م</span></span>
        </div>
    </div>

    <div id="preview-modal" class="preview-modal">
        <div class="preview-toolbar">
            <button class="btn-dl" onclick="downloadPDF()">📥 تحميل PDF</button>
            <button class="btn-close" onclick="closePreview()">❌ إغلاق</button>
        </div>
        <div class="preview-content" id="preview-content-box"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUj_rV2wOr34kfzF7wj3j-33rq6KD2gTg",
            authDomain: "khaled-eb11f.firebaseapp.com",
            projectId: "khaled-eb11f",
            storageBucket: "khaled-eb11f.firebasestorage.app",
            messagingSenderId: "313117586245",
            appId: "1:313117586245:web:989e2d45c3d1cd83f7c42c",
            databaseURL: "https://khaled-eb11f-default-rtdb.firebaseio.com"
        };

        let db, appData = {}, currentClientId = null;
        let isInitialLoad = true;
        let confirmAction = null; // لتخزين الدالة اللي هتتنفذ بعد التأكيد

        window.onload = function() {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            db.ref('khaled_sini_clients_v2').on('value', snap => {
                appData = snap.val() || {};
                renderDashboard();
                if(currentClientId && appData[currentClientId]) renderClientDetails(currentClientId);
                
                if(isInitialLoad) {
                    document.getElementById('loader').style.display = 'none';
                    isInitialLoad = false;
                }
            });
            // ضبط تاريخ اليوم كافتراضي
            document.getElementById('item-date').valueAsDate = new Date();
        };

        // --- دوال مساعدة (Vibration + Toast) ---
        function vibrate() { if (navigator.vibrate) navigator.vibrate(50); }
        function showToast(msg, type = 'success') {
            vibrate();
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
        }

        // --- Custom Confirm Modal ---
        function openConfirmModal(title, msg, onConfirm) {
            vibrate();
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            document.getElementById('confirm-modal').style.display = 'flex';
            confirmAction = onConfirm;
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; confirmAction = null; }
        document.getElementById('confirm-btn').onclick = function() {
            if(confirmAction) confirmAction();
            closeConfirmModal();
        };

        function calcBalance(txs) {
            let total = 0;
            if(txs) Object.values(txs).forEach(tx => {
                if(tx.type === 'item') total += (Number(tx.price) * Number(tx.qty));
                else total -= Number(tx.amount);
            });
            return total;
        }

        function renderDashboard() {
            const list = document.getElementById('client-list');
            list.innerHTML = '';
            let globalTotal = 0;
            
            Object.keys(appData).reverse().forEach(uid => {
                const client = appData[uid];
                const bal = calcBalance(client.transactions);
                globalTotal += bal;
                
                const div = document.createElement('div');
                div.className = 'client-item';
                div.onclick = () => openClientDetails(uid);
                div.innerHTML = `
                    <div class="cli-balance" dir="ltr">${bal} ج</div>
                    <div class="cli-info">
                        <h3>${client.name}</h3>
                        <div style="font-size:13px; color:var(--text-gray); margin-top:3px;">${client.phone || 'بدون رقم'}</div>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('global-total').innerText = globalTotal;
        }

        function addClient() {
            const name = document.getElementById('new-client-name').value.trim();
            const phone = document.getElementById('new-client-phone').value.trim();
            if(!name) return showToast("⚠️ الرجاء إدخال اسم العميل!", "error");
            
            db.ref('khaled_sini_clients_v2').push().set({
                name: name, phone: phone, created_at: Date.now()
            }).then(() => {
                showToast("تم إضافة العميل بنجاح ✅");
                document.getElementById('new-client-name').value = '';
                document.getElementById('new-client-phone').value = '';
            });
        }

        function openClientDetails(uid) {
            currentClientId = uid;
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('client-details-view').style.display = 'block';
            document.getElementById('item-date').valueAsDate = new Date(); // ريست التاريخ لليوم
            renderClientDetails(uid);
        }

        function closeClientDetails() {
            currentClientId = null;
            document.getElementById('client-details-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }

        function renderClientDetails(uid) {
            const client = appData[uid];
            document.getElementById('cd-name').innerText = client.name;
            const txList = document.getElementById('cd-tx-list');
            txList.innerHTML = '';
            
            if(client.transactions) {
                // ترتيب العمليات تنازلي (الأحدث فوق) بناء على الـ timestamp اللي اتسجل بيه (بما في ذلك التاريخ المخصص)
                const sortedTxs = Object.entries(client.transactions).sort((a, b) => b[1].timestamp - a[1].timestamp);
                
                sortedTxs.forEach(([tid, tx]) => {
                    const div = document.createElement('div');
                    div.className = `tx-item ${tx.type === 'item' ? 'is-debt' : 'is-pay'}`;
                    const dateStr = new Date(tx.timestamp).toLocaleDateString('ar-EG');
                    
                    div.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button onclick="confirmDeleteTx('${uid}','${tid}')" style="background:none; border:none; color:#B71C1C; cursor:pointer; font-size:16px; padding:5px;">✖</button>
                            <div style="font-weight:900; font-size:17px; color:${tx.type === 'item' ? 'var(--primary)' : '#1B5E20'}" dir="ltr">
                                ${tx.type === 'item' ? (tx.price*tx.qty) : '- '+tx.amount} ج
                            </div>
                        </div>
                        <div style="text-align:right; max-width: 60%;">
                            <div style="font-weight:bold; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${tx.type === 'item' ? tx.desc : 'سداد نقدية ✅'}</div>
                            <div style="font-size:12px; color:#777; margin-top:2px;" dir="ltr">${dateStr}</div>
                        </div>
                    `;
                    txList.appendChild(div);
                });
            }
            document.getElementById('cd-total-due').innerText = calcBalance(client.transactions);
        }

        function saveItem() {
            const d = document.getElementById('item-desc').value.trim();
            const q = document.getElementById('item-qty').value;
            const p = document.getElementById('item-price').value;
            const dateVal = document.getElementById('item-date').value;
            
            if(!d || !q || !p) return showToast("⚠️ برجاء استكمال بيانات الصنف!", "error");
            
            // استخدام التاريخ المخصص أو تاريخ اليوم لو المربع فاضي
            let txTime = dateVal ? new Date(dateVal).getTime() : Date.now();
            // لو اليوزر اختار تاريخ قديم، هنضيفله الوقت الحالي كساعات عشان الترتيب يكون دقيق
            if(dateVal) { const dObj = new Date(dateVal); const now = new Date(); dObj.setHours(now.getHours(), now.getMinutes(), now.getSeconds()); txTime = dObj.getTime(); }

            db.ref(`khaled_sini_clients_v2/${currentClientId}/transactions`).push().set({ 
                type:'item', desc:d, qty:q, price:p, timestamp: txTime
            }).then(() => {
                showToast("تم تسجيل المديونية ✅");
                document.getElementById('item-desc').value=''; document.getElementById('item-price').value=''; document.getElementById('item-qty').value='1';
            });
        }

        function savePayment() {
            const a = document.getElementById('pay-amount').value;
            const dateVal = document.getElementById('item-date').value;
            if(!a || a<=0) return showToast("⚠️ أدخل مبلغ السداد بشكل صحيح!", "error");
            
            let txTime = dateVal ? new Date(dateVal).getTime() : Date.now();
            if(dateVal) { const dObj = new Date(dateVal); const now = new Date(); dObj.setHours(now.getHours(), now.getMinutes(), now.getSeconds()); txTime = dObj.getTime(); }

            db.ref(`khaled_sini_clients_v2/${currentClientId}/transactions`).push().set({ 
                type:'pay', amount:a, timestamp: txTime 
            }).then(() => {
                showToast("تم تسجيل الدفعة ✅");
                document.getElementById('pay-amount').value='';
            });
        }

        function confirmDeleteTx(uid, tid) { 
            openConfirmModal('مسح العملية', 'هل أنت متأكد من مسح هذه العملية من حساب العميل؟', () => {
                db.ref(`khaled_sini_clients_v2/${uid}/transactions/${tid}`).remove(); 
                showToast("تم المسح ✅");
            });
        }
        function confirmDeleteClient() { 
            openConfirmModal('حذف نهائي', 'تحذير: سيتم مسح العميل وكل حساباته نهائياً ولن يمكنك استرجاعها!', () => {
                db.ref(`khaled_sini_clients_v2/${currentClientId}`).remove();
                closeClientDetails();
                showToast("تم حذف العميل بنجاح ✅");
            });
        }

        // --- تظبيط الواتساب (Regex احترافي) ---
        function sendWhatsApp() {
            if(!currentClientId) return;
            const client = appData[currentClientId];
            const balance = calcBalance(client.transactions);
            
            let txDetails = "";
            if(client.transactions) {
                // الفلترة من الأقدم للأحدث عشان الرسالة تتقري صح
                const txs = Object.values(client.transactions).sort((a,b) => a.timestamp - b.timestamp);
                txs.forEach(tx => {
                    const txDate = new Date(tx.timestamp).toLocaleDateString('ar-EG');
                    if(tx.type === 'item') {
                        txDetails += `%0A▫️ ${txDate}: ${tx.desc} [${tx.qty}×${tx.price}] = ${tx.price * tx.qty} ج`;
                    } else {
                        txDetails += `%0A✅ ${txDate}: سداد نقدية (-${tx.amount} ج)`;
                    }
                });
            }

            const msg = `أهلاً بك يا *${client.name}*،%0Aكشف حساب من محلات خالد الصيني.%0A%0A*تفاصيل الحساب:*${txDetails}%0A%0A================%0A*إجمالي المطلوب سداده:* ${balance} ج.م%0A================%0Aللاستفسار يرجى مراجعة المحل.`;
            
            let url = '';
            if(client.phone && client.phone.trim() !== "") {
                let phone = client.phone.trim().replace(/\D/g, ''); // تنظيف من أي رموز
                // لو الرقم بيبدأ بـ 0 و 11 رقم (موبايل مصري) نحط 2
                if(phone.length === 11 && phone.startsWith('0')) {
                    phone = '2' + phone; 
                } 
                // لو الرقم 10 أرقام (كتبه من غير 0) نحط 20
                else if (phone.length === 10 && !phone.startsWith('20')) {
                    phone = '20' + phone;
                }
                url = `https://api.whatsapp.com/send?phone=${phone}&text=${msg}`;
            } else {
                url = `https://api.whatsapp.com/send?text=${msg}`; 
            }
            window.open(url, '_blank');
        }

        // --- الفاتورة الـ PDF الاحترافية (مضبوطة عربي 100%) ---
        function previewInvoice() {
            const client = appData[currentClientId];
            if(!client) return;
            let rows = '';
            
            if(client.transactions) {
                // ترتيب للفاتورة
                const txs = Object.values(client.transactions).sort((a,b) => a.timestamp - b.timestamp);
                txs.forEach(tx => {
                    const txDate = new Date(tx.timestamp).toLocaleDateString('ar-EG');
                    if(tx.type === 'item') {
                        rows += `<tr>
                            <td style="text-align:center; font-weight:bold;">${tx.price * tx.qty} ج</td>
                            <td style="text-align:center;" dir="ltr">${tx.qty} x ${tx.price}</td>
                            <td style="text-align:center;">${txDate}</td>
                            <td><bdi>${tx.desc}</bdi></td>
                        </tr>`;
                    } else {
                        rows += `<tr>
                            <td style="text-align:center; color:#1B5E20; font-weight:bold;" dir="ltr">${tx.amount} ج -</td>
                            <td style="text-align:center;">-</td>
                            <td style="text-align:center;">${txDate}</td>
                            <td style="font-weight:bold;">سداد نقدية ✅</td>
                        </tr>`;
                    }
                });
            }

            // استخدام جدول (Table) في تصميم الـ Header عشان html2pdf ميعكسش العربي
            const html = `
            <div class="pdf-page" id="printable-pdf">
                <div class="pdf-header">
                    <h1>خالد الصيني</h1>
                    <p>كشف حساب عميل مفصل</p>
                </div>
                
                <div style="background: #F5F5DC; border-radius: 8px; padding: 10px; margin-bottom: 20px;">
                    <table style="width: 100%; border: none; font-size: 16px; font-weight: bold;">
                        <tr>
                            <td style="text-align: right; border: none; padding: 5px;">
                                العميل: <bdi>${client.name}</bdi><br>
                                الهاتف: <bdi>${client.phone || 'غير مسجل'}</bdi>
                            </td>
                            <td style="text-align: left; border: none; padding: 5px; vertical-align: top;">
                                تاريخ الكشف: ${new Date().toLocaleDateString('ar-EG')}
                            </td>
                        </tr>
                    </table>
                </div>
                
                <table class="pdf-table">
                    <thead>
                        <tr>
                            <th style="width:15%; text-align:center;">الإجمالي</th>
                            <th style="width:20%; text-align:center;">العدد والسعر</th>
                            <th style="width:20%; text-align:center;">التاريخ</th>
                            <th style="width:45%; text-align:right;">البيان</th>
                        </tr>
                    </thead>
                    <tbody>${rows || '<tr><td colspan="4" style="text-align:center;">لا توجد حركات مسجلة</td></tr>'}</tbody>
                </table>
                
                <div style="overflow:hidden;">
                    <div class="pdf-total-box">
                        المطلوب سداده: ${calcBalance(client.transactions)} ج.م
                    </div>
                </div>
            </div>`;
            
            document.getElementById('preview-content-box').innerHTML = html;
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

        function downloadPDF() {
            const client = appData[currentClientId];
            const el = document.getElementById('printable-pdf');
            const opt = {
                margin:       10,
                filename:     `فاتورة_الصيني_${client.name}.pdf`,
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(el).save();
        }

        function exportToExcel() {
            if(Object.keys(appData).length === 0) return showToast("⚠️ لا توجد بيانات للتصدير!", "error");
            
            let csvContent = "\uFEFFاسم العميل,رقم الهاتف,إجمالي المسحوبات,إجمالي المدفوعات,الصافي المطلوب\n";
            Object.values(appData).forEach(client => {
                let debt = 0; let paid = 0;
                if(client.transactions) {
                    Object.values(client.transactions).forEach(tx => {
                        if(tx.type === 'item') debt += (Number(tx.price) * Number(tx.qty));
                        else paid += Number(tx.amount);
                    });
                }
                csvContent += `${client.name},${client.phone || "غير مسجل"},${debt},${paid},${debt - paid}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `جرد_محلات_الصيني_${new Date().toLocaleDateString('ar-EG')}.csv`;
            link.click();
            showToast("تم تصدير ملف الإكسيل بنجاح ✅");
        }

        function filterClients() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.client-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    </script>
</body>
