<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصيني - إدارة الهواتف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            /* الألوان: أبيض في بني */
            --bg-color: #fcfaf8; 
            --surface: #ffffff; 
            --primary: #5d4037; 
            --primary-light: #8d6e63; 
            --primary-dark: #3e2723; 
            --accent: #d7ccc8; 
            --text-main: #3e2723;
            --text-muted: #795548;
            --danger: #c62828;
            --radius: 12px;
            --shadow: 0 8px 20px rgba(93, 64, 55, 0.08);
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: all 0.3s ease; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* --- الهيدر واللوجو --- */
        .app-header {
            width: 100%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            padding: 20px 25px; border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .brand svg { width: 40px; height: 40px; fill: white; }
        .brand-text { display: flex; flex-direction: column; }
        .brand h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        .brand span { font-size: 13px; color: var(--accent); font-weight: 600; }

        /* --- واجهة التطبيق --- */
        #main-app { display: flex; width: 100%; max-width: 800px; flex-direction: column; gap: 20px; }
        
        .top-toolbar { display: flex; gap: 15px; width: 100%; flex-wrap: wrap; }
        .search-box { flex-grow: 1; min-width: 200px; }
        .search-box input { 
            width: 100%; padding: 14px 20px; border: 2px solid var(--accent); 
            border-radius: 30px; font-size: 16px; outline: none; box-shadow: var(--shadow); 
        }
        .search-box input:focus { border-color: var(--primary); }
        .add-client-btn { 
            background: var(--primary-dark); color: white; border: none; padding: 0 25px; 
            border-radius: 30px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: var(--shadow);
        }
        .add-client-btn:hover { background: var(--primary); transform: scale(1.02); }

        .dashboard-stats {
            background: var(--surface); border: 2px dashed var(--primary-light);
            padding: 20px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center;
        }
        .stat-title { font-size: 18px; font-weight: 800; color: var(--text-muted); }
        .stat-value { font-size: 28px; font-weight: 900; color: var(--primary-dark); }

        /* --- كارت العميل --- */
        .client-card {
            background: var(--surface); border-radius: var(--radius);
            padding: 25px; box-shadow: var(--shadow); border-right: 5px solid var(--primary);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .client-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; margin-bottom: 20px;
        }
        .client-info { display: flex; flex-direction: column; gap: 8px; width: 60%; }
        .client-name-input {
            border: none; font-size: 22px; font-weight: 900; color: var(--primary-dark);
            outline: none; background: transparent; width: 100%;
        }
        .client-phone-input {
            border: none; font-size: 15px; font-weight: 600; color: var(--text-muted);
            outline: none; background: transparent; width: 100%;
        }
        .client-name-input::placeholder, .client-phone-input::placeholder { color: #bcaaa4; }
        
        .action-buttons { display: flex; gap: 10px; }
        .icon-btn {
            background: var(--bg-color); border: 1px solid var(--accent); width: 40px; height: 40px;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .btn-pdf { color: var(--primary); }
        .btn-pdf:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-del { color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* تفاصيل المسحوبات */
        .row-item { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; background: #faf8f5; padding: 8px; border-radius: 8px; border: 1px solid var(--accent); }
        .row-item input {
            border: none; background: transparent; font-size: 15px; outline: none; font-weight: 600; color: var(--text-main);
        }
        .desc-input { flex-grow: 1; border-left: 2px solid var(--accent) !important; padding-left: 10px; }
        .price-input { width: 90px; text-align: center; font-weight: 800; color: var(--primary-dark); }
        .row-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 22px; font-weight: bold; opacity: 0.7; }
        .row-del:hover { opacity: 1; }

        .card-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; padding-top: 15px; border-top: 2px dashed var(--accent);
        }
        .add-row-btn { 
            background: var(--bg-color); border: 2px solid var(--primary-light); color: var(--primary-dark); 
            font-weight: 800; cursor: pointer; padding: 8px 15px; border-radius: 6px; font-size: 14px;
        }
        .add-row-btn:hover { background: var(--primary-light); color: white; }
        .total-amount { font-size: 18px; font-weight: 800; color: var(--text-muted); }
        .total-amount span { font-size: 24px; font-weight: 900; color: var(--primary-dark); }
        
        /* --- تصميم الفاتورة الـ PDF المخفية للطباعة --- */
        #invoice-template { display: none; }
        .print-view {
            padding: 40px; background: white; color: #3e2723; font-family: 'Cairo', sans-serif; direction: rtl;
            border: 1px solid #d7ccc8;
        }
        .print-header { 
            text-align: center; border-bottom: 3px solid #5d4037; padding-bottom: 20px; margin-bottom: 30px;
            display: flex; flex-direction: column; align-items: center;
        }
        .print-header svg { width: 50px; height: 50px; fill: #5d4037; margin-bottom: 10px; }
        .print-header h1 { margin: 0; font-size: 30px; font-weight: 900; color: #3e2723; }
        .print-header p { margin: 5px 0 0 0; color: #795548; font-weight: 600; }
        
        .print-client-info { background: #fcfaf8; padding: 15px; border-radius: 8px; border: 1px solid #d7ccc8; margin-bottom: 30px; }
        .print-client-info h3 { margin: 0 0 10px 0; font-size: 20px; color: #3e2723; }
        .print-client-info p { margin: 0; font-size: 16px; font-weight: bold; color: #5d4037; }

        .print-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .print-table th, .print-table td { border: 1px solid #d7ccc8; padding: 15px; text-align: right; font-size: 16px; font-weight: bold; }
        .print-table th { background-color: #5d4037; color: white; }
        .print-table tr:nth-child(even) { background-color: #faf8f5; }
        
        .print-total-box { 
            background: #5d4037; color: white; padding: 15px 20px; border-radius: 8px;
            display: inline-block; font-size: 22px; font-weight: 900; float: left;
        }
        .print-footer { clear: both; text-align: center; margin-top: 60px; color: #8d6e63; font-weight: bold; border-top: 1px dashed #d7ccc8; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="brand">
            <svg viewBox="0 0 24 24"><path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-4 20c-.83 0-1.5-.67-1.5-1.5S11.17 18 12 18s1.5.67 1.5 1.5S12.83 21 12 21zm3.5-4H8.5V4h7v13z"/></svg>
            <div class="brand-text">
                <h1>الصيني</h1>
                <span>لإدارة الهواتف والمديونيات</span>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div class="top-toolbar">
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 ابحث باسم العميل أو رقم التليفون..." oninput="filterClients()">
            </div>
            <button class="add-client-btn" onclick="createNewClient()">+ إضافة عميل جديد</button>
        </div>

        <div class="dashboard-stats">
            <div class="stat-title">إجمالي مديونيات السوق:</div>
            <div class="stat-value"><span id="global-total">0</span> <span style="font-size:18px;">ج.م</span></div>
        </div>

        <div id="clients-container"></div>
    </div>

    <div id="invoice-template"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAUj_rV2wOr34kfzF7wj3j-33rq6KD2gTg",
            authDomain: "khaled-eb11f.firebaseapp.com",
            projectId: "khaled-eb11f",
            storageBucket: "khaled-eb11f.firebasestorage.app",
            messagingSenderId: "313117586245",
            appId: "1:313117586245:web:989e2d45c3d1cd83f7c42c",
            measurementId: "G-83QXDTRRJP",
            databaseURL: "https://khaled-eb11f-default-rtdb.firebaseio.com"
        };

        let db, appData = {};

        window.onload = function() {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            
            // تحميل البيانات مباشرة بدون تسجيل دخول
            db.ref('shop_clients').on('value', renderClients);
        };

        function renderClients(snap) {
            appData = snap.val() || {};
            const container = document.getElementById('clients-container');
            let globalTotal = 0;
            container.innerHTML = '';

            if (Object.keys(appData).length === 0) {
                container.innerHTML = "<p style='text-align:center; color:var(--text-muted); font-weight:bold; margin-top:30px;'>لا توجد حسابات مسجلة حالياً. ابدأ بإضافة عميل جديد.</p>";
                document.getElementById('global-total').innerText = "0";
                return;
            }

            // عرض العملاء من الأحدث للأقدم
            Object.keys(appData).reverse().forEach(uid => {
                const client = appData[uid];
                let clientTotal = 0;
                let itemsHTML = '';

                if(client.items) {
                    Object.keys(client.items).forEach(iid => {
                        const item = client.items[iid];
                        const price = Number(item.price) || 0;
                        clientTotal += price;
                        
                        itemsHTML += `
                            <div class="row-item">
                                <input type="text" class="desc-input" value="${item.desc || ''}" placeholder="صنف / صيانة / مسحوبات..." onchange="updateItem('${uid}', '${iid}', 'desc', this.value)">
                                <input type="number" class="price-input" value="${item.price !== undefined ? item.price : ''}" placeholder="السعر" onchange="updateItem('${uid}', '${iid}', 'price', this.value)">
                                <span style="font-weight:bold; color:var(--primary); margin-left:10px;">ج.م</span>
                                <button class="row-del" onclick="delItem('${uid}', '${iid}')" title="مسح الصنف">×</button>
                            </div>
                        `;
                    });
                }
                globalTotal += clientTotal;

                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerHTML = `
                    <div class="client-header">
                        <div class="client-info">
                            <input type="text" class="client-name-input" value="${client.name || ''}" placeholder="اسم العميل" onchange="db.ref('shop_clients/${uid}').update({name: this.value})">
                            <input type="text" class="client-phone-input" value="${client.phone || ''}" placeholder="رقم التليفون 📱" onchange="db.ref('shop_clients/${uid}').update({phone: this.value})">
                        </div>
                        <div class="action-buttons">
                            <button class="icon-btn btn-pdf" onclick="generatePDF('${uid}')" title="طباعة فاتورة">🖨️</button>
                            <button class="icon-btn btn-del" onclick="deleteClient('${uid}')" title="حذف العميل نهائياً">🗑️</button>
                        </div>
                    </div>
                    <div class="items-list">${itemsHTML}</div>
                    <div class="card-footer">
                        <button class="add-row-btn" onclick="addItem('${uid}')">+ إضافة صنف جديد</button>
                        <div class="total-amount">الحساب: <span>${clientTotal}</span> ج.م</div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            document.getElementById('global-total').innerText = globalTotal;
            filterClients(); // تطبيق الفلتر لو كان اليوزر بيبحث
        }

        // عمليات الفايربيز
        const createNewClient = () => {
            db.ref('shop_clients').push().set({ name: "", phone: "", items: {} });
            document.getElementById('search').value = "";
        };
        const deleteClient = (uid) => confirm("هل أنت متأكد من حذف العميل وحسابه بالكامل؟") ? db.ref(`shop_clients/${uid}`).remove() : null;
        const addItem = (uid) => db.ref(`shop_clients/${uid}/items`).push().set({ desc: "", price: "" });
        const updateItem = (uid, iid, field, val) => db.ref(`shop_clients/${uid}/items/${iid}`).update({ [field]: val });
        const delItem = (uid, iid) => db.ref(`shop_clients/${uid}/items/${iid}`).remove();

        // فلترة البحث بالاسم أو التليفون
        function filterClients() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.client-card').forEach(card => {
                const name = card.querySelector('.client-name-input').value.toLowerCase();
                const phone = card.querySelector('.client-phone-input').value.toLowerCase();
                if(name.includes(q) || phone.includes(q)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // --- دالة الفاتورة الـ PDF الفخمة ---
        function generatePDF(uid) {
            const client = appData[uid];
            if (!client) return;

            let total = 0;
            let rows = '';
            
            if(client.items) {
                Object.values(client.items).forEach(item => {
                    const price = Number(item.price) || 0;
                    total += price;
                    if(item.desc || price > 0) {
                        rows += `<tr><td>${price} ج.م</td><td>${item.desc || 'بدون بيان'}</td></tr>`;
                    }
                });
            }

            const dateStr = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const phoneText = client.phone ? client.phone : 'غير مسجل';
            const nameText = client.name ? client.name : 'عميل نقدي';
            
            // تركيب قالب الفاتورة
            const printHTML = `
                <div class="print-view">
                    <div class="print-header">
                        <svg viewBox="0 0 24 24"><path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-4 20c-.83 0-1.5-.67-1.5-1.5S11.17 18 12 18s1.5.67 1.5 1.5S12.83 21 12 21zm3.5-4H8.5V4h7v13z"/></svg>
                        <h1>الصيني للهواتف المحمولة</h1>
                        <p>تاريخ الإصدار: ${dateStr}</p>
                    </div>
                    
                    <div class="print-client-info">
                        <h3>فاتورة حساب السيد/ة: ${nameText}</h3>
                        <p>رقم الهاتف: <span dir="ltr">${phoneText}</span></p>
                    </div>

                    <table class="print-table">
                        <thead><tr><th style="width:25%;">المبلغ</th><th>البيان (مسحوبات / صيانة)</th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="2" style="text-align:center;">لا توجد أصناف مسجلة</td></tr>'}</tbody>
                    </table>

                    <div style="overflow: hidden; margin-top: 20px;">
                        <div class="print-total-box">الإجمالي الكلي: ${total} ج.م</div>
                    </div>

                    <div class="print-footer">
                        <p>شكراً لثقتكم في الصيني للهواتف المحمولة والإلكترونيات</p>
                    </div>
                </div>
            `;

            const element = document.getElementById('invoice-template');
            element.innerHTML = printHTML;
            element.style.display = 'block';

            // إعدادات التصدير بصيغة PDF بجودة عالية
            const opt = {
                margin:       10,
                filename:     `فاتورة_الصيني_${nameText}.pdf`,
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // تحويل وتحميل
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.display = 'none'; 
            });
        }
    </script>
</body>
</html>
