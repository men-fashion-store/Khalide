<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محلات الصيني - بريميوم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            /* الألوان المطلوبة: بني وكريمي وأبيض وأسود */
            --primary: #3E2723; /* بني غامق جداً */
            --primary-light: #5D4037; /* بني متوسط */
            --bg-main: #F5F5DC; /* كريمي فاتح */
            --bg-card: #ffffff; /* أبيض */
            --text-dark: #000000; /* أسود */
            --text-gray: #4E342E; /* بني نصوص */
            --border: #D7CCC8; /* بيج للحدود */
            --danger: #B71C1C;
            --success: #1B5E20;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(62, 39, 35, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none; }
        body { margin: 0; padding: 0; background: var(--bg-main); color: var(--text-dark); -webkit-tap-highlight-color: transparent; }
        
        /* --- الهيدر --- */
        .header { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; color: var(--primary); }
        .header-logo { width: 45px; height: 45px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .header-logo svg { width: 25px; height: 25px; fill: #fff; }

        /* --- شريط الإجمالي --- */
        .total-banner { background: var(--primary); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .total-banner span { font-size: 24px; font-weight: 900; color: #D7CCC8; }

        /* --- الحاوية --- */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        /* --- الكروت --- */
        .action-card { background: var(--bg-card); border-radius: var(--radius); padding: 15px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        .search-box input { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 25px; font-size: 15px; background: #FFFBF0; }
        
        .add-client-form input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 10px; background: #FFFBF0; }
        .btn-add-user { background: var(--primary); color: white; border: none; border-radius: 8px; width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- قائمة العملاء --- */
        .client-item { background: var(--bg-card); border-radius: var(--radius); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); margin-bottom: 12px; border-right: 6px solid var(--primary); transition: 0.3s; }
        .client-item:hover { transform: scale(1.02); }
        .cli-info h3 { margin: 0; font-size: 19px; font-weight: 900; color: var(--primary); }
        .cli-balance { font-size: 22px; font-weight: 900; color: var(--text-dark); background: #EFEBE9; padding: 5px 15px; border-radius: 8px; }

        /* ================= شاشة التفاصيل ================= */
        #client-details-view { display: none; background: var(--bg-main); min-height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 200; overflow-y: auto; padding-bottom: 120px; }
        .cd-header { background: var(--primary); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        
        .add-section { background: var(--bg-card); border-radius: var(--radius); padding: 15px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        .add-section h4 { margin: 0 0 15px 0; color: var(--primary); font-weight: 800; border-bottom: 2px solid var(--bg-main); padding-bottom: 5px; }
        
        .btn-save-item { background: var(--primary); color: white; width: 100%; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save-pay { background: var(--text-dark); color: white; border: none; border-radius: 8px; width: 60px; display: flex; align-items: center; justify-content: center; }

        .tx-item { background: var(--bg-card); border-radius: var(--radius); padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border-right: 5px solid #ccc; }
        .tx-item.is-debt { border-right-color: var(--primary); }
        .tx-item.is-pay { border-right-color: var(--success); }
        
        /* البار السفلي */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 205; border-radius: 20px 20px 0 0; }
        .bb-total { font-size: 28px; font-weight: 900; color: #D7CCC8; }

        /* --- الفاتورة PDF --- */
        .pdf-page { padding: 40px; background: white; color: black; font-family: 'Cairo', sans-serif; direction: rtl; width: 800px; margin: 0 auto; }
        .pdf-header { text-align: center; border-bottom: 4px solid #3E2723; padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-header h1 { margin: 0; font-size: 32px; color: #3E2723; }
        .pdf-table th { background: #3E2723; color: #fff; padding: 12px; }
        .pdf-total-box { border: 3px solid #3E2723; padding: 15px; font-size: 22px; font-weight: 900; float: left; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <div style="font-size: 20px;">⚙️</div>
            <div class="header-title">
                محلات الصيني
                <div class="header-logo">
                    <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
                </div>
            </div>
        </div>

        <div class="total-banner">
            <div>💰 إجمالي ديون السوق:</div>
            <div><span id="global-total">0</span> ج.م</div>
        </div>

        <div class="container">
            <div class="action-card">
                <div class="search-box" style="margin-bottom: 15px;">
                    <input type="text" id="searchInput" placeholder="🔍 ابحث عن اسم العميل..." oninput="filterClients()">
                </div>
                
                <div class="add-client-form">
                    <input type="text" id="new-client-name" placeholder="👤 اسم العميل الجديد (مطلوب)">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-add-user" onclick="addClient()">➕</button>
                        <input type="tel" id="new-client-phone" placeholder="📞 رقم الموبايل (اختياري)">
                    </div>
                </div>
            </div>

            <div class="client-list" id="client-list"></div>
        </div>
    </div>

    <div id="client-details-view">
        <div class="cd-header">
            <button onclick="closeClientDetails()" style="background:none; border:none; color:#fff; font-size:25px; cursor:pointer;">🏠</button>
            <div style="font-size: 20px; font-weight: 900;" id="cd-name">اسم العميل</div>
            <div style="display:flex; gap:10px;">
                <button onclick="deleteCurrentClient()" style="background:none; border:none; font-size:20px;">🗑️</button>
                <button onclick="printInvoice()" style="background:none; border:none; font-size:20px;">🖨️</button>
            </div>
        </div>

        <div class="container">
            <div class="add-section">
                <h4>📦 إضافة صنف مديونية</h4>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="number" id="item-price" placeholder="السعر" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:5px;">
                    <input type="number" id="item-qty" placeholder="العدد" value="1" style="width:60px; padding:10px; border:1px solid #ccc; border-radius:5px;">
                    <input type="text" id="item-desc" placeholder="الصنف" style="flex:2; padding:10px; border:1px solid #ccc; border-radius:5px;">
                </div>
                <button class="btn-save-item" onclick="saveItem()">💾 حفظ في الحساب</button>

                <div style="display:flex; gap:10px; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                    <button class="btn-save-pay" onclick="savePayment()">💵</button>
                    <input type="number" id="pay-amount" placeholder="مبلغ سداد نقدية" style="flex:1; padding:12px; border:1px solid #ccc; border-radius:8px;">
                </div>
            </div>

            <div class="tx-list" id="cd-tx-list"></div>
        </div>

        <div class="bottom-bar">
            <div class="bb-total"><span id="cd-total-due">0</span> ج.م</div>
            <div style="font-weight: 800; font-size: 18px;">المطلوب سداده:</div>
        </div>
    </div>

    <div id="invoice-template" style="display:none;"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUj_rV2wOr34kfzF7wj3j-33rq6KD2gTg",
            authDomain: "khaled-eb11f.firebaseapp.com",
            projectId: "khaled-eb11f",
            storageBucket: "khaled-eb11f.firebasestorage.app",
            messagingSenderId: "313117586245",
            appId: "1:313117586245:web:989e2d45c3d1cd83f7c42c",
            databaseURL: "https://khaled-eb11f-default-rtdb.firebaseio.com"
        };

        let db, appData = {}, currentClientId = null;

        window.onload = function() {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            db.ref('shop_clients_final').on('value', snap => {
                appData = snap.val() || {};
                renderDashboard();
                if(currentClientId && appData[currentClientId]) renderClientDetails(currentClientId);
            });
        };

        function calcBalance(txs) {
            let total = 0;
            if(txs) Object.values(txs).forEach(tx => {
                if(tx.type === 'item') total += (Number(tx.price) * Number(tx.qty));
                else total -= Number(tx.amount);
            });
            return total;
        }

        function renderDashboard() {
            const list = document.getElementById('client-list');
            list.innerHTML = '';
            let globalTotal = 0;
            Object.keys(appData).reverse().forEach(uid => {
                const client = appData[uid];
                const bal = calcBalance(client.transactions);
                globalTotal += bal;
                const div = document.createElement('div');
                div.className = 'client-item';
                div.onclick = () => openClientDetails(uid);
                div.innerHTML = `
                    <div class="cli-balance">ج <b>${bal}</b></div>
                    <div class="cli-info"><h3>${client.name}</h3><p>${client.phone || 'بدون رقم'}</p></div>
                `;
                list.appendChild(div);
            });
            document.getElementById('global-total').innerText = globalTotal;
        }

        function addClient() {
            const name = document.getElementById('new-client-name').value.trim();
            if(!name) return alert("⚠️ لازم تكتب اسم العميل!");
            db.ref('shop_clients_final').push().set({
                name: name, phone: document.getElementById('new-client-phone').value, created_at: Date.now()
            });
            document.getElementById('new-client-name').value = '';
            document.getElementById('new-client-phone').value = '';
        }

        function openClientDetails(uid) {
            currentClientId = uid;
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('client-details-view').style.display = 'block';
            renderClientDetails(uid);
        }

        function closeClientDetails() {
            currentClientId = null;
            document.getElementById('client-details-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }

        function renderClientDetails(uid) {
            const client = appData[uid];
            document.getElementById('cd-name').innerText = client.name;
            const txList = document.getElementById('cd-tx-list');
            txList.innerHTML = '';
            if(client.transactions) {
                Object.keys(client.transactions).reverse().forEach(tid => {
                    const tx = client.transactions[tid];
                    const div = document.createElement('div');
                    div.className = `tx-item ${tx.type === 'item' ? 'is-debt' : 'is-pay'}`;
                    div.innerHTML = `
                        <div style="font-weight:900; font-size:18px; color:${tx.type === 'item' ? '#3E2723' : '#1B5E20'}">
                            ${tx.type === 'item' ? (tx.price*tx.qty) : '- '+tx.amount} ج
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:bold;">${tx.type === 'item' ? tx.desc : 'دفعة مسددة ✅'}</div>
                            <div style="font-size:12px; color:#777;">${new Date(tx.timestamp).toLocaleDateString('ar-EG')}</div>
                        </div>
                        <button onclick="deleteTx('${uid}','${tid}')" style="background:none; border:none; color:red; cursor:pointer;">❌</button>
                    `;
                    txList.appendChild(div);
                });
            }
            document.getElementById('cd-total-due').innerText = calcBalance(client.transactions);
        }

        function saveItem() {
            const d = document.getElementById('item-desc').value, q = document.getElementById('item-qty').value, p = document.getElementById('item-price').value;
            if(!d || !q || !p) return alert("كمل البيانات!");
            db.ref(`shop_clients_final/${currentClientId}/transactions`).push().set({ type:'item', desc:d, qty:q, price:p, timestamp:Date.now() });
            document.getElementById('item-desc').value=''; document.getElementById('item-price').value='';
        }

        function savePayment() {
            const a = document.getElementById('pay-amount').value;
            if(!a || a<=0) return alert("أدخل المبلغ!");
            db.ref(`shop_clients_final/${currentClientId}/transactions`).push().set({ type:'pay', amount:a, timestamp:Date.now() });
            document.getElementById('pay-amount').value='';
        }

        function deleteTx(uid, tid) { if(confirm("حذف؟")) db.ref(`shop_clients_final/${uid}/transactions/${tid}`).remove(); }
        function deleteCurrentClient() { if(confirm("مسح العميل نهائياً؟")) db.ref(`shop_clients_final/${currentClientId}`).remove(); }

        function printInvoice() {
            const client = appData[currentClientId];
            let rows = '';
            if(client.transactions) Object.values(client.transactions).forEach(tx => {
                rows += `<tr>
                    <td>${tx.type==='item' ? (tx.price*tx.qty)+' ج' : tx.amount+' ج-'}</td>
                    <td>${tx.type==='item' ? tx.qty+' x '+tx.price : '-'}</td>
                    <td>${new Date(tx.timestamp).toLocaleDateString('ar-EG')}</td>
                    <td>${tx.type==='item' ? tx.desc : 'سداد نقدية'}</td>
                </tr>`;
            });

            const html = `<div class="pdf-page">
                <div class="pdf-header"><h1>محلات الصيني</h1><p>كشف حساب عميل</p></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <div>التاريخ: ${new Date().toLocaleDateString('ar-EG')}</div>
                    <div>العميل: ${client.name}</div>
                </div>
                <table style="width:100%; border-collapse:collapse;" border="1">
                    <thead><tr><th>الإجمالي</th><th>السعر والعدد</th><th>التاريخ</th><th>البيان</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="pdf-total-box">المطلوب سداده: ${calcBalance(client.transactions)} ج.م</div>
            </div>`;
            const el = document.getElementById('invoice-template');
            el.innerHTML = html; el.style.display='block';
            html2pdf().from(el).save(`الصيني_${client.name}.pdf`).then(()=>el.style.display='none');
        }

        function filterClients() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.client-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
